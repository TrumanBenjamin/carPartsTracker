<div class="card">
  <div class="item-top">
    <h4 class="item-name">{{ part.partName }}</h4>
    <span class="item-price">${{ part.price }}</span>
  </div>

  <div class="meta">
    <span><strong>Brand:</strong> {{ part.brand }}</span>
    <span><strong>Installed:</strong> {{ part.installed ? 'Yes' : 'No' }}</span>
  </div>

  <div class="actions" style="margin-top: 12px;">
    <button class="btn-primary" (click)="onEdit()">Edit</button>
    <button class="btn-danger" (click)="onDelete()">Delete</button>
  </div>
</div>
