<h2>Car Parts Tracker</h2>

<app-part-edit
  [selectedPart]="selectedPart"
  (save)="onSavePart($event)"
  (cancel)="onCancelEdit()"
></app-part-edit>

<div *ngIf="parts.length === 0" class="card">No parts yet. Add your first part.</div>

<app-part-item
  *ngFor="let part of parts"
  [part]="part"
  (edit)="onEditPart($event)"
  (remove)="onDeletePart($event)"
></app-part-item>
