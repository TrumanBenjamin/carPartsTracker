<div class="app-shell">
  <header class="app-header">
    <div>
      <h2 class="app-title">Car Parts Tracker</h2>
    </div>
    <span class="badge">{{ parts.length }} total</span>
  </header>

  <div *ngIf="errorMessage" class="card notice">
    <strong>Notice:</strong> {{ errorMessage }}
  </div>

  <app-part-edit
    class="add-card"
    [selectedPart]="selectedPart"
    (save)="onSavePart($event)"
    (cancel)="onCancelEdit()"
  ></app-part-edit>

  <div *ngIf="parts.length === 0" class="card empty">No parts yet. Add your first part.</div>

  <app-part-item
    *ngFor="let part of parts"
    [part]="part"
    (edit)="onEditPart($event)"
    (remove)="onDeletePart($event)"
  ></app-part-item>

  <div class="card total-card" *ngIf="parts.length > 0">
    <span>Total Value</span>
    <strong>${{ totalPrice.toFixed(2) }}</strong>
  </div>
</div>
